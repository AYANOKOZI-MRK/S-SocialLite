<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S Social Live - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-150 flex items-center justify-center min-h-screen">
    <div class="bg-pink p-8 rounded-lg shadow-md w-full max-w-md mx-4">
        <h2 class="text-3xl font-bold text-yellow-350 text-center mb-2">S Social Live</h2>
        <h3 class="text-xl font-semibold text-black-700 text-center mb-6">নতুন অ্যাকাউন্ট তৈরি করুন</h3>
        
        <form id="registerForm" class="space-y-4">
            <input type="text" id="username" placeholder="ইউজারনেম (ইংরেজিতে ছোট অক্ষরে)" class="w-full p-3 border border-gray-300 rounded" required>
            <input type="email" id="email" placeholder="ইমেল ঠিকানা" class="w-full p-3 border border-gray-300 rounded" required>
            <input type="password" id="password" placeholder="নতুন পাসওয়ার্ড" class="w-full p-3 border border-gray-300 rounded" required>
            <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold p-3 rounded">সাইন আপ করুন</button>
        </form>
        
        <div class="text-center mt-4">
            <a href="index.html" class="text-blue-500 text-sm hover:underline">ইতিমধ্যে অ্যাকাউন্ট আছে? লগ ইন করুন</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('https://s-sociallive.onrender.com/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                if (response.ok) {
                    alert('🎉 অ্যাকাউন্ট তৈরি সফল হয়েছে! এবার লগ ইন করুন।');
                    window.location.href = 'index.html';
                } else {
                    alert('❌ ভুল হয়েছে: ' + (data.message || 'আবার চেষ্টা করুন'));
                }
            } catch (err) {
                alert('❌ সার্ভার চালু হতে একটু সময় নিচ্ছে, ৩০ সেকেন্ড পর আবার চেষ্টা করুন!');
            }
        });
    </script>
</body>
</html>
